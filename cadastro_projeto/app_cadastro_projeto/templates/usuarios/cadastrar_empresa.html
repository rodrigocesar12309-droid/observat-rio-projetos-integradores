<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Empresa | Observatório</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #F4F2EC; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 60px auto; padding: 0 20px; }
        .header { margin-bottom: 2rem; }
        .header h2 { font-family: 'DM Serif Display', serif; font-size: 32px; color: #1A1917; margin-bottom: 8px; }
        .card { background: white; border: 1px solid #E5E5E5; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: #9A9790; letter-spacing: 1.6px; text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 8px; box-sizing: border-box; font-family: 'DM Sans'; }
        .btn-submit { width: 100%; background: #1A1917; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>

<main class="container">
    <div class="header">
        <h2>Cadastrar Empresa</h2>
        <p style="color: #9A9790; font-size: 14px;">Preencha os dados da nova empresa parceira.</p>
    </div>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Nome da Empresa</label>
                {{ form.nome }}
            </div>

            <div class="form-group">
                <label>CNPJ</label>
                {{ form.cnpj }}
            </div>

            <button type="submit" class="btn-submit">Salvar Cadastro</button>
        </form>
    </div>
</main>

<script>
    // Máscara CNPJ
    const cnpjInput = document.querySelector('input[name="cnpj"]');
    if(cnpjInput) {
        cnpjInput.addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/, '$1.$2');
            v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
            v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
            v = v.replace(/(\d{4})(\d)/, '$1-$2');
            e.target.value = v;
        });
    }
</script>

</body>
</html>
