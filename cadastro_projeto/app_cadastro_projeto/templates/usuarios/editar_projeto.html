<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Projeto - Observatório de Projetos</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7fafc; margin: 0; padding: 40px 20px; }
        .navbar { background-color: white; border-bottom: 1px solid #e2e8f0; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; margin: -40px -20px 40px -20px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { background-color: #5830f0; color: white; width: 35px; height: 35px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .brand-text h1 { font-size: 16px; color: #0c2340; margin: 0; font-weight: 700; }
        .card { background: white; border-radius: 16px; padding: 35px; max-width: 560px; margin: 0 auto; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .card h2 { font-size: 20px; color: #0c2340; margin: 0 0 25px 0; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        .form-group input, .form-group textarea { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; width: 100%; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { border-color: #5830f0; }
        .form-group textarea { resize: vertical; min-height: 90px; }
        .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
        .btn-cancelar { background: none; border: 1px solid #e2e8f0; color: #718096; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-cancelar:hover { background-color: #f7fafc; }
        .btn-salvar { background-color: #5830f0; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-salvar:hover { background-color: #431ecc; }
        .mensagem-sucesso { background:#f0fff4; border:1px solid #68d391; color:#276749; padding:12px 16px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:16px; text-align:center; }
        .mensagem-erro { background:#fff5f5; border:1px solid #fc8181; color:#c53030; padding:12px 16px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:16px; text-align:center; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <div class="brand-icon">🎓</div>
        <div class="brand-text">
            <h1>Observatório de Projetos</h1>
        </div>
    </div>
    <a href="{% url 'dashboard' %}" style="font-size:13px; color:#5830f0; font-weight:600; text-decoration:none;">← Voltar ao Dashboard</a>
</nav>

<div class="card">
    <h2>✏️ Editar Projeto</h2>

    {% if messages %}
        {% for message in messages %}
            {% if message.tags == 'error' %}
                <div class="mensagem-erro">⚠️ {{ message }}</div>
            {% else %}
                <div class="mensagem-sucesso">✅ {{ message }}</div>
            {% endif %}
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Título *</label>
            <input type="text" name="titulo" value="{{ projeto.titulo }}" required>
        </div>
        <div class="form-group">
            <label>Descrição *</label>
            <textarea name="descricao" required>{{ projeto.descricao }}</textarea>
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <input type="text" name="categoria" value="{{ projeto.categoria }}">
        </div>
        <div class="form-group">
            <label>Semestre</label>
            <input type="text" name="semestre" value="{{ projeto.semestre }}">
        </div>
        <div class="form-group">
            <label>Tags (separe por vírgula)</label>
            <input type="text" name="tags" value="{{ projeto.tags }}" placeholder="Ex: React, Node.js, Python">
        </div>
        <div class="form-group">
            <label>Link do Repositório</label>
            <input type="url" name="link_repositorio" value="{{ projeto.link_repositorio|default:'' }}" placeholder="https://github.com/...">
        </div>
        <div class="form-group">
            <label>Link da Demo</label>
            <input type="url" name="link_demo" value="{{ projeto.link_demo|default:'' }}" placeholder="https://...">
        </div>
        <div class="actions">
            <a href="{% url 'dashboard' %}" class="btn-cancelar">Cancelar</a>
            <button type="submit" class="btn-salvar">💾 Salvar Alterações</button>
        </div>
    </form>
</div>

</body>
</html>
