<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Tópico — Fórum | Faculdade Senac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--navy:#1B3A6B;--navy-dk:#122850;--navy-lt:#E8EEF7;--orange:#F5A623;--orange-dk:#D4891A;--orange-lt:#FEF3DC;--green:#38a169;--green-lt:#f0fff4;--green-bd:#c6f6d5;--red:#e53e3e;--red-lt:#fff5f5;--red-bd:#fed7d7;--ink:#1a202c;--ink-2:#2d3748;--muted:#718096;--line:#e2e8f0;--bg:#F4F6FA;--card:#fff;--r:10px;--r-lg:14px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.06);}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--ink-2);min-height:100vh;}
        header{background:var(--navy);border-bottom:3px solid var(--orange);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(27,58,107,.25);}
        .brand{display:flex;align-items:center;gap:.75rem;}
        .brand-icon{width:38px;height:38px;border-radius:9px;background:var(--orange);display:grid;place-items:center;color:var(--navy);font-size:.95rem;font-weight:800;}
        .brand-name{font-weight:700;font-size:.95rem;color:#fff;}
        .nav-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:600;color:rgba(255,255,255,.75);text-decoration:none;}
        .nav-back:hover{color:#fff;}
        .toast-wrap{position:fixed;top:74px;right:1.25rem;z-index:200;display:flex;flex-direction:column;gap:.5rem;}
        .toast{padding:.875rem 1.25rem;border-radius:var(--r);font-size:.82rem;font-weight:500;border:1px solid;}
        .toast.error{background:var(--red-lt);color:#9b2c2c;border-color:var(--red-bd);}

        main{max-width:700px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}
        .page-title{font-size:1.4rem;font-weight:800;color:var(--navy);}
        .page-sub{font-size:.85rem;color:var(--muted);margin-top:.2rem;margin-bottom:2rem;}

        .form-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.75rem;box-shadow:var(--sh);}
        .field{margin-bottom:1.2rem;}
        .field label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.45rem;}
        .field input,.field select,.field textarea{width:100%;padding:.65rem .9rem;border:1.5px solid var(--line);border-radius:var(--r);font-family:'Open Sans',sans-serif;font-size:.85rem;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s;}
        .field textarea{min-height:140px;resize:vertical;}
        .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);}
        .checkbox-row{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--ink-2);}
        .form-footer{display:flex;gap:.75rem;justify-content:flex-end;padding-top:1.25rem;border-top:1px solid var(--line);margin-top:1.25rem;}
        .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:8px;font-family:'Open Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .15s;}
        .btn-ghost{border:1px solid var(--line);background:none;color:var(--ink-2);}
        .btn-ghost:hover{background:var(--bg);}
        .btn-navy{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(27,58,107,.25);}
        .btn-navy:hover{background:var(--navy-dk);}
    </style>
</head>
<body>

{% if messages %}
<div class="toast-wrap">{% for m in messages %}<div class="toast error">{{ m }}</div>{% endfor %}</div>
{% endif %}

<header>
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
        <div><div class="brand-name">Faculdade Senac</div></div>
    </div>
    <a href="{% url 'forum_lista' %}" class="nav-back"><i class="fas fa-arrow-left"></i> Voltar ao fórum</a>
</header>

<main>
    <p class="page-title">Novo Tópico</p>
    <p class="page-sub">Compartilhe sua dúvida, ideia ou aviso com a turma</p>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Título *</label>
                <input type="text" name="titulo" placeholder="Ex: Dúvida sobre React no projeto..." required>
            </div>
            <div class="field">
                <label>Categoria</label>
                <select name="categoria">
                    <option value="duvida">❓ Dúvida</option>
                    <option value="discussao">💬 Discussão</option>
                    <option value="aviso">📢 Aviso</option>
                    <option value="projeto">📁 Projeto</option>
                </select>
            </div>
            <div class="field">
                <label>Conteúdo *</label>
                <textarea name="conteudo" placeholder="Descreva com detalhes..." required></textarea>
            </div>
            {% if perfil.tipo_usuario == 'professor' or perfil.tipo_usuario == 'administracao' %}
            <div class="field">
                <label class="checkbox-row">
                    <input type="checkbox" name="fixado"> Fixar este tópico no topo
                </label>
            </div>
            {% endif %}
            <div class="form-footer">
                <a href="{% url 'forum_lista' %}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-navy"><i class="fas fa-paper-plane"></i> Publicar Tópico</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
