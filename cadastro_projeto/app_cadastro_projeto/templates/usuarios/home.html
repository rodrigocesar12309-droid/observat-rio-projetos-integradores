<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Observatório de Projetos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Geist:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --v:     #5B47E0;
      --v-lt:  #EDE9FC;
      --v-dk:  #3D2DB8;
      --em:    #10B89A;
      --ro:    #F43F5E;
      --ink:   #0D0D14;
      --ink-2: #3A3A4A;
      --muted: #7B7B96;
      --line:  #EAEAF0;
      --bg:    #F0EFFA;
      --card:  #FFFFFF;
      --r:     14px;
      --sh:    0 4px 6px rgba(0,0,0,.04), 0 16px 48px rgba(91,71,224,.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      /* subtle grid background */
      background-image:
        radial-gradient(circle at 20% 20%, rgba(91,71,224,.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(16,184,154,.09) 0%, transparent 50%);
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
    }

    /* BRAND */
    .brand {
      display: flex; align-items: center; gap: .75rem;
      justify-content: center; margin-bottom: 2rem;
    }
    .brand-icon {
      width: 48px; height: 48px; border-radius: 13px;
      background: linear-gradient(135deg, var(--v), #8B5CF6);
      display: grid; place-items: center; color: #fff; font-size: 1.3rem;
      box-shadow: 0 4px 12px rgba(91,71,224,.4);
    }
    .brand-text h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 1.15rem; color: var(--ink); line-height: 1.2;
    }
    .brand-text span {
      font-size: .7rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--v);
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      box-shadow: var(--sh);
      border: 1px solid var(--line);
    }
    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 1.4rem; color: var(--ink);
      margin-bottom: .35rem;
    }
    .card-sub { font-size: .82rem; color: var(--muted); margin-bottom: 1.75rem; }

    /* ALERTAS */
    .alert {
      display: flex; align-items: center; gap: .6rem;
      padding: .75rem 1rem; border-radius: 10px;
      font-size: .8rem; font-weight: 500; margin-bottom: 1rem;
    }
    .alert-error   { background: #FFF1F3; color: #BE1234; border: 1px solid #FECDD8; }
    .alert-success { background: #F0FDF9; color: #0A7A64; border: 1px solid #A7F3E4; }

    /* FIELDS */
    .field { margin-bottom: 1.15rem; }
    .field label {
      display: block; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); margin-bottom: .45rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: .8rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; height: 48px;
      padding: 0 1rem 0 2.4rem;
      border: 1.5px solid var(--line); border-radius: 11px;
      font-family: 'Geist', sans-serif; font-size: .9rem; color: var(--ink);
      background: #FAFAFD; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--v);
      box-shadow: 0 0 0 3px rgba(91,71,224,.12);
      background: #fff;
    }

    /* BUTTON */
    .btn-login {
      width: 100%; height: 50px; margin-top: .5rem;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--v), #7C63F5);
      color: #fff; font-family: 'Geist', sans-serif;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(91,71,224,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(91,71,224,.5);
    }
    .btn-login:active { transform: translateY(0); }


  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="brand-text">
        <h1>Observatório de Projetos</h1>
        <span>Sistema de Gestão de PI</span>
      </div>
    </div>

    <div class="card">
      <p class="card-title">Bem-vindo de volta</p>
      <p class="card-sub">Faça login para acessar seu painel</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" id="loginForm">
        {% csrf_token %}
        <div class="field">
          <label>E-mail</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="text" name="username" id="username" placeholder="seu@email.com" required autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt" style="margin-right:.5rem;"></i>Entrar
        </button>
      </form>


    </div>

  </div>


</body>
</html>
