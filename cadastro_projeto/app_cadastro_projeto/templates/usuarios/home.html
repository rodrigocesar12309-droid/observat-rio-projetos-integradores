<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Faculdade SENAC | Observatório de PI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --azul:     #1B3A6B;
      --azul-dk:  #122850;
      --azul-lt:  #E8EEF7;
      --laranja:  #F5A623;
      --laranja-dk:#D4891A;
      --laranja-lt:#FEF3DC;
      --ink:      #1a1a2e;
      --ink-2:    #374151;
      --muted:    #6B7280;
      --line:     #E5E7EB;
      --bg:       #F3F6FB;
      --card:     #FFFFFF;
      --sh:       0 4px 6px rgba(0,0,0,.04), 0 20px 50px rgba(27,58,107,.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(circle at 15% 15%, rgba(27,58,107,.1) 0%, transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(245,166,35,.08) 0%, transparent 50%);
    }

    .login-wrap { width: 100%; max-width: 440px; }

    /* LOGO SENAC */
    .logo-wrap {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-senac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
    }
    /* Ícone estilizado SENAC */
    .senac-icon {
      width: 64px; height: 64px;
      background: var(--azul);
      border-radius: 16px;
      display: grid; place-items: center;
      margin: 0 auto .5rem;
      box-shadow: 0 4px 16px rgba(27,58,107,.3);
      position: relative;
      overflow: hidden;
    }
    .senac-icon::before {
      content: '';
      position: absolute;
      bottom: -8px; left: -8px;
      width: 50px; height: 50px;
      background: var(--laranja);
      border-radius: 50%;
      opacity: .9;
    }
    .senac-icon::after {
      content: '';
      position: absolute;
      bottom: 0px; left: 8px;
      width: 36px; height: 36px;
      background: var(--azul-dk);
      border-radius: 50%;
    }
    .senac-icon i {
      position: relative;
      z-index: 2;
      color: #fff;
      font-size: 1.4rem;
    }
    .logo-nome {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--azul);
      letter-spacing: -.01em;
      line-height: 1;
    }
    .logo-nome span { color: var(--laranja); }
    .logo-sub {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--laranja);
    }
    .logo-sistema {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .25rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 2.25rem 2rem;
      box-shadow: var(--sh);
      border: 1px solid var(--line);
      border-top: 4px solid var(--azul);
    }
    .card-title {
      font-weight: 800; font-size: 1.35rem; color: var(--azul);
      margin-bottom: .3rem;
    }
    .card-sub { font-size: .82rem; color: var(--muted); margin-bottom: 1.75rem; }

    /* ALERTAS */
    .alert {
      display: flex; align-items: center; gap: .6rem;
      padding: .75rem 1rem; border-radius: 10px;
      font-size: .8rem; font-weight: 600; margin-bottom: 1rem;
    }
    .alert-error   { background: #FFF1F3; color: #BE1234; border: 1px solid #FECDD8; }
    .alert-success { background: #F0FDF9; color: #0A7A64; border: 1px solid #A7F3E4; }

    /* FIELDS */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); margin-bottom: .4rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: .8rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; height: 48px;
      padding: 0 1rem 0 2.4rem;
      border: 1.5px solid var(--line); border-radius: 10px;
      font-family: 'Open Sans', sans-serif; font-size: .9rem; color: var(--ink);
      background: var(--bg); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(27,58,107,.1);
      background: #fff;
    }

    /* BUTTON */
    .btn-login {
      width: 100%; height: 50px; margin-top: .5rem;
      border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--azul), #2a5298);
      color: #fff; font-family: 'Open Sans', sans-serif;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(27,58,107,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(27,58,107,.45);
      background: linear-gradient(135deg, var(--azul-dk), var(--azul));
    }

    /* RODAPÉ */
    .footer-login {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .72rem;
      color: var(--muted);
    }
    .footer-login strong { color: var(--azul); }

    /* DIVIDER laranja */
    .divider-laranja {
      height: 3px;
      background: linear-gradient(90deg, var(--laranja), var(--laranja-dk));
      border-radius: 2px;
      margin: 1.5rem 0 0;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-senac">
        <div class="senac-icon">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <div class="logo-nome">Senac <span>PI</span></div>
        <div class="logo-sub">Faculdade Senac</div>
        <div class="logo-sistema">Observatório de Projetos Integradores</div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">Bem-vindo de volta</p>
      <p class="card-sub">Faça login para acessar seu painel</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" id="loginForm" autocomplete="on">
        {% csrf_token %}
        <div class="field">
          <label>E-mail</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
          <input type="email" name="email" id="email" placeholder="seu@email.com" required autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt" style="margin-right:.5rem;"></i>Entrar no Sistema
        </button>
      </form>

      <div class="divider-laranja"></div>
    </div>

    <div class="footer-login">
      <strong>Faculdade Senac</strong> · Sistema de Projetos Integradores
    </div>

  </div>
</body>
</html>
