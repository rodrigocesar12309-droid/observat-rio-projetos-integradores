<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Avaliação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h1>Painel de Avaliação</h1>
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h6>Total de Projetos</h6>
                    <h3>{{ total }}</h3>
                </div>
            </div>
        </div>

        <table class="table table-striped bg-white shadow-sm">
            <thead>
                <tr>
                    <th>Projeto</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for p in projetos %}
                <tr>
                    <td>{{ p.titulo }}</td>
                    <td>{{ p.status }}</td>
                    <td>
                        {% if p.status == 'em_avaliacao' %}
                            <a href="{% url 'avaliar_projeto' p.id %}" class="btn btn-primary btn-sm">Avaliar</a>
                        {% else %}
                            <span class="text-muted">Nota: {{ p.nota }}</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Voltar ao Dashboard</a>
    </div>
</body>
</html>
